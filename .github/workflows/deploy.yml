name: Deploy to Vercel (Production)

# Build Next.js di runner GitHub (16GB RAM untuk repo public),
# lalu deploy hasil prebuild-nya ke Vercel. Ini menghindari OOM di
# Vercel Hobby (8GB) dan error `spawn cmd.exe ENOENT` di Windows lokal.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Identifier project Vercel (bukan rahasia — tanpa token tidak berguna).
env:
  VERCEL_ORG_ID: team_fyO58EYhyb4ZTiomXHoy9Xv6
  VERCEL_PROJECT_ID: prj_ADBgk6He0iR8ODTXD5YhOGjR6Np6

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel project settings & env (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (Next.js prebuilt output)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
